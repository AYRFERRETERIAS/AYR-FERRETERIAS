<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AYR Ferreterías | Del Viso</title>
    <meta name="description" content="AYR Ferreterías en Del Viso: pinturería, plomería, herramientas eléctricas, cerrajería, tornillería y artículos para el hogar. Consultá stock y precios por WhatsApp." />
    <link rel="canonical" href="https://ferreteriaayr.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="AYR Ferreterías | Del Viso" />
    <meta property="og:description" content="Pinturería, plomería, herramientas eléctricas, cerrajería, tornillería y artículos para el hogar. Consultá stock y precios por WhatsApp." />
    <meta property="og:image" content="https://ferreteriaayr.com/logo.jpg" />
    <meta property="og:url" content="https://ferreteriaayr.com/" />
    <meta property="og:locale" content="es_AR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Formulario estático oculto: existe SOLO para que Netlify lo detecte al
      hacer el build (Netlify lee el HTML generado, no ejecuta JS). El
      formulario visible que completan los usuarios es el de React
      (src/components/ContactForm.jsx) y envía los datos a este mismo nombre
      ("contacto") por fetch. No borrar ni cambiarle el name/los campos sin
      actualizar también ContactForm.jsx.
    -->
    <form name="contacto" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="nombre" />
      <input type="tel" name="telefono" />
      <input type="email" name="email" />
      <input type="text" name="interes" />
      <textarea name="mensaje"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
